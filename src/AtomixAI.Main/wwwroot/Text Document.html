<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtomixAI Terminal</title>
    <style>
        :root { 
            --bg: #ffffff; --panel: #f3f3f3; --text: #333333; 
            --accent: #0078d4; --danger: #d13438; --ai-msg: #f0f0f0; 
            --user-msg: #0078d4; --border: #e0e0e0; --input-bg: #ffffff;
            --scroll-thumb: #cccccc; --header-h: 32px; --footer-h: 28px;
        }
        [data-theme='dark'] { 
            --bg: #1e1e1e; --panel: #2d2d2d; --text: #e0e0e0; 
            --accent: #00a2ff; --ai-msg: #3d3d3d; --user-msg: #00a2ff;
            --border: #444444; --input-bg: #1e1e1e; --scroll-thumb: #555555;
        }

        body { 
            margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); 
            color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; 
        }

        /* --- ШАПКА (Инструментальная панель) --- */
        .header { 
            height: var(--header-h); padding: 0 10px; background: var(--panel); 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--border); box-sizing: border-box;
        }
        .brand-group { display: flex; align-items: center; gap: 8px; }
        .logo { font-family: 'Segoe MDL2 Assets'; color: var(--accent); font-size: 14px; }
        .brand-name { font-weight: 800; font-size: 11px; letter-spacing: 0.5px; }
        
        .tools-group { display: flex; gap: 4px; margin-left: 10px; border-left: 1px solid var(--border); padding-left: 8px; }
        .tool-btn { 
            background: none; border: none; color: var(--text); font-family: 'Segoe MDL2 Assets'; 
            font-size: 14px; cursor: pointer; padding: 4px; border-radius: 4px; transition: 0.2s; opacity: 0.7;
        }
        .tool-btn:hover { background: var(--border); opacity: 1; color: var(--accent); }
        .version-tag { font-size: 9px; font-weight: bold; color: #888; }

        /* --- ЗОНА ЧАТА --- */
        #chat { 
            flex: 1; overflow-y: auto; padding: 12px; display: flex; 
            flex-direction: column; gap: 10px; scrollbar-width: thin; 
            scrollbar-color: var(--scroll-thumb) transparent;
        }
        #chat::-webkit-scrollbar { width: 6px; }
        #chat::-webkit-scrollbar-thumb { background: var(--scroll-thumb); border-radius: 10px; }

        .msg { padding: 8px 12px; border-radius: 10px; max-width: 88%; font-size: 13px; line-height: 1.4; position: relative; }
        .user { align-self: flex-end; background: var(--user-msg); color: white; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: var(--ai-msg); border: 1px solid var(--border); border-bottom-left-radius: 2px; }
        
        .system-info { font-size: 11px; color: #888; font-style: italic; margin: 5px 0; text-align: center; }

        /* --- ЗОНА ВВОДА --- */
        .input-area { padding: 10px; background: var(--bg); border-top: 1px solid var(--border); position: relative; }
        .input-container { 
            background: var(--panel); padding: 8px 10px 35px 10px; 
            border: 1px solid var(--border); border-radius: 8px; transition: 0.2s; 
        }
        .input-container:focus-within { border-color: var(--accent); background: var(--input-bg); }

        textarea { 
            width: 100%; background: none; border: none; color: var(--text); 
            resize: none; font-family: inherit; font-size: 13.5px; outline: none; 
            max-height: 120px; line-height: 1.4; 
        }

        .action-btn { 
            position: absolute; bottom: 18px; background: none; border: none; 
            cursor: pointer; width: 28px; height: 28px; display: flex; 
            align-items: center; justify-content: center; border-radius: 6px; 
            transition: 0.2s; color: var(--accent); font-family: 'Segoe MDL2 Assets'; font-size: 16px; 
        }
        .action-btn:hover { background: rgba(128,128,128,0.15); }
        #micBtn { left: 18px; }
        .send-btn { right: 18px; transform: scaleX(-1); }

        /* --- ФУТЕР --- */
        .footer { 
            height: var(--footer-h); padding: 0 10px; background: var(--panel); 
            border-top: 1px solid var(--border); display: flex; 
            justify-content: space-between; align-items: center; font-size: 10.5px; color: #888; 
        }
        .status-group { display: flex; align-items: center; gap: 6px; }
        .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; }
        .status-dot.online { background: #4caf50; box-shadow: 0 0 4px #4caf50; }
        .model-link { cursor: pointer; text-decoration: underline; opacity: 0.8; }
        .model-link:hover { opacity: 1; color: var(--accent); }

        /* Переключатель темы */
        .theme-switch { display: flex; align-items: center; gap: 4px; }
        .switch { position: relative; display: inline-block; width: 28px; height: 14px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { 
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; 
            background-color: #ccc; transition: .3s; border-radius: 14px; 
        }
        .slider:before { 
            position: absolute; content: ""; height: 10px; width: 10px; 
            left: 2px; bottom: 2px; background-color: white; transition: .3s; border-radius: 50%; 
        }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(14px); }
    </style>
</head>
<body data-theme="light">

<div class="header">
    <div class="brand-group">
        <span class="logo"></span>
        <span class="brand-name">ATOMIXAI</span>
        <div class="tools-group">
            <button class="tool-btn" title="Добавить Python скрипты (Add Scripts)"></button>
            <button class="tool-btn" title="База знаний (Self-Learning)"></button>
            <button class="tool-btn" title="Журнал логов (Logs)"></button>
        </div>
    </div>
    <span class="version-tag">v1.2</span>
</div>

<div id="chat">
    <div class="msg ai">Система AtomixAI готова. <br><b>Ядро:</b> 60 команд загружено. <br><b>Скрипты:</b> 120 файлов активно.</div>
    <div class="system-info">Контекст: Активный вид (Lvl 1)</div>
</div>

<div class="input-area">
    <button id="micBtn" class="action-btn" onclick="toggleVoice()" title="Голосовой ввод"></button>
    <div class="input-container">
        <textarea rows="1" id="userInput" placeholder="Введите команду или вопрос..."></textarea>
        <button id="sendBtn" class="action-btn send-btn" onclick="sendMessage()" title="Отправить"></button>
    </div>
</div>

<div class="footer">
    <div class="status-group">
        <span class="status-dot online"></span>
        <span>Model: <span class="model-link" id="currentModel">qwen2.5:7b</span></span>
    </div>
    <div class="theme-switch">
        <span style="font-family: 'Segoe MDL2 Assets'; font-size: 10px;"></span>
        <label class="switch">
            <input type="checkbox" id="themeToggle" onclick="toggleTheme()">
            <span class="slider"></span>
        </label>
        <span style="font-family: 'Segoe MDL2 Assets'; font-size: 10px;"></span>
    </div>
</div>

<script>
    // Логика переключения тем
    function toggleTheme() {
        const body = document.body;
        const currentTheme = body.getAttribute('data-theme');
        body.setAttribute('data-theme', currentTheme === 'light' ? 'dark' : 'light');
    }

    // Авто-высота текстового поля
    const tx = document.getElementById('userInput');
    tx.addEventListener("input", function() {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight) + 'px';
    }, false);

    function sendMessage() {
        const input = document.getElementById('userInput');
        if(!input.value.trim()) return;
        
        const chat = document.getElementById('chat');
        chat.innerHTML += `<div class="msg user">${input.value}</div>`;
        input.value = '';
        input.style.height = 'auto';
        chat.scrollTop = chat.scrollHeight;
        
        // Здесь будет вызов C# (Revit)
    }
</script>

</body>
</html>
