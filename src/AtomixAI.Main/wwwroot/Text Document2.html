<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtomixAI Terminal</title>
    <style>
        :root { 
            --bg: #ffffff; --panel: #f3f3f3; --text: #333333; 
            --accent: #0078d4; --ai-msg: #f0f0f0; --user-msg: #0078d4; 
            --border: #e0e0e0; --input-bg: #ffffff; --scroll-thumb: #cccccc;
        }
        [data-theme='dark'] { 
            --bg: #1e1e1e; --panel: #2d2d2d; --text: #e0e0e0; 
            --accent: #00a2ff; --ai-msg: #3d3d3d; --user-msg: #00a2ff;
            --border: #444444; --input-bg: #1e1e1e; --scroll-thumb: #555555;
        }

        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* --- ШАПКА --- */
        .header { height: 34px; padding: 0 10px; background: var(--panel); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .brand { display: flex; align-items: center; gap: 6px; font-weight: 800; font-size: 11px; color: var(--accent); }
        .nav-tools { display: flex; gap: 2px; margin-left: 12px; border-left: 1px solid var(--border); padding-left: 8px; }
        
        /* IT Кнопки */
        .it-btn { background: none; border: none; color: var(--text); font-family: 'Segoe MDL2 Assets'; font-size: 14px; cursor: pointer; padding: 5px; border-radius: 4px; transition: 0.2s; opacity: 0.7; }
        .it-btn:hover { background: var(--border); opacity: 1; color: var(--accent); }

        /* --- ЧАТ --- */
        #chat { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 9px 13px; border-radius: 10px; max-width: 85%; font-size: 13px; line-height: 1.4; }
        .user { align-self: flex-end; background: var(--user-msg); color: white; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: var(--ai-msg); border: 1px solid var(--border); border-bottom-left-radius: 2px; }

        /* --- ВВОД --- */
        .input-area { padding: 10px; background: var(--bg); border-top: 1px solid var(--border); }
        .input-box { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px 32px 10px; position: relative; }
        textarea { width: 100%; background: none; border: none; color: var(--text); resize: none; font-size: 13.5px; outline: none; }
        
        .icon-action { position: absolute; bottom: 8px; font-family: 'Segoe MDL2 Assets'; font-size: 15px; color: var(--accent); cursor: pointer; background: none; border: none; padding: 4px; border-radius: 4px; }
        .icon-action:hover { background: rgba(128,128,128,0.1); }

        /* --- ФУТЕР --- */
        .footer { height: 26px; padding: 0 10px; background: var(--panel); border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-size: 10px; color: #888; }
        .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #4caf50; display: inline-block; margin-right: 4px; box-shadow: 0 0 4px #4caf50; }

        /* Переключатель темы */
        .switch { position: relative; width: 26px; height: 14px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .3s; border-radius: 14px; }
        .slider:before { position: absolute; content: ""; height: 10px; width: 10px; left: 2px; bottom: 2px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(12px); }
    </style>
</head>
<body data-theme="light">

<div class="header">
    <div style="display: flex; align-items: center;">
        <div class="brand"><span></span> ATOMIXAI</div>
        <div class="nav-tools">
            <button class="it-btn" title="Python Скрипты"></button>
            <button class="it-btn" title="База знаний (Самообучение)"></button>
            <button class="it-btn" title="Логи системы"></button>
            <button class="it-btn" title="Настройки"></button>
        </div>
    </div>
    <span style="font-size: 9px; opacity: 0.5;">v1.2</span>
</div>

<div id="chat">
    <div class="msg ai">
        <b>Система готова.</b><br>
        ⚙️ Команд: 60<br>
        🐍 Скриптов: 120<br>
        🧠 Паттернов: 45
    </div>
</div>

<div class="input-area">
    <div class="input-box">
        <textarea rows="1" id="userInput" placeholder="Спросите AI..."></textarea>
        <button class="icon-action" style="left: 8px;" title="Голос"></button>
        <button class="icon-action" style="right: 8px; transform: scaleX(-1);" onclick="sendMessage()" title="Отправить"></button>
    </div>
</div>

<div class="footer">
    <div><span class="status-dot"></span> Model: <span style="text-decoration: underline; cursor: pointer;">qwen2.5:7b</span></div>
    <div style="display: flex; align-items: center; gap: 5px;">
        <span style="font-family: 'Segoe MDL2 Assets'; font-size: 10px;"></span>
        <label class="switch">
            <input type="checkbox" onclick="document.body.setAttribute('data-theme', this.checked ? 'dark' : 'light')">
            <span class="slider"></span>
        </label>
        <span style="font-family: 'Segoe MDL2 Assets'; font-size: 10px;"></span>
    </div>
</div>

<script>
    function sendMessage() {
        const input = document.getElementById('userInput');
        if(!input.value.trim()) return;
        document.getElementById('chat').innerHTML += `<div class="msg user">${input.value}</div>`;
        input.value = '';
        document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
    }
</script>

</body>
</html>
